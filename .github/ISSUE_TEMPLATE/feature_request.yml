name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve the SDK? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's missing today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Include API examples if possible.
      render: cpp

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New API / Feature
        - Performance
        - Platform Support
        - Documentation
        - Other
    validations:
      required: true
